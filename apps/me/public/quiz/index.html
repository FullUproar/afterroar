<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Tabletop Player Profile</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  h1 { font-size: 28px; line-height: 1.2; margin: 0 0 16px; color: #fff; font-weight: 700; }
  h2 { font-size: 22px; line-height: 1.3; margin: 0 0 16px; color: #fff; font-weight: 600; }
  p { margin: 0 0 14px; color: #cbd5e1; }
  small { color: #94a3b8; font-size: 13px; }
  button {
    appearance: none; border: none; cursor: pointer;
    font: inherit; line-height: 1.4;
    border-radius: 12px;
    transition: transform 0.05s, background 0.15s, border-color 0.15s;
  }
  button:active { transform: scale(0.98); }
  .btn-primary {
    background: #FF8200; color: #0a0a0a;
    padding: 14px 24px; font-size: 17px; font-weight: 700;
    width: 100%;
  }
  .btn-primary:hover { background: #ff9533; }
  .btn-secondary {
    background: transparent; color: #FF8200;
    padding: 12px 18px; font-size: 15px; font-weight: 600;
    border: 1px solid rgba(255, 130, 0, 0.4);
  }
  .btn-secondary:hover { background: rgba(255, 130, 0, 0.1); border-color: #FF8200; }
  .progress-track {
    height: 4px; background: #1f2937; border-radius: 2px;
    margin: 0 0 24px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: #FF8200; transition: width 0.3s; }
  .question-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; font-size: 13px; color: #94a3b8;
  }
  .question-text {
    font-size: 22px; line-height: 1.35; font-weight: 600; color: #fff;
    margin: 8px 0 24px;
  }
  .answer {
    display: block; width: 100%; text-align: left;
    background: #1f2937; color: #e2e8f0;
    padding: 18px 20px; margin-bottom: 12px;
    border: 2px solid transparent;
    font-size: 16px; line-height: 1.4;
  }
  .answer:hover { background: #2d3748; border-color: rgba(255, 130, 0, 0.3); }
  .answer:active { background: rgba(255, 130, 0, 0.15); }
  .answer.selected { border-color: #FF8200; background: rgba(255, 130, 0, 0.1); }
  .answer-game .game-name {
    display: block; font-weight: 700; color: #FBDB65; font-size: 17px; margin-bottom: 4px;
  }
  .answer-game .game-meta { color: #94a3b8; font-size: 14px; }
  .likert-row {
    display: flex; gap: 8px;
    margin-bottom: 12px;
  }
  .likert-row .answer {
    flex: 1; text-align: center; padding: 14px 6px; font-size: 13px;
    margin-bottom: 0;
  }
  .results-narrative {
    background: rgba(255, 130, 0, 0.08);
    border-left: 3px solid #FF8200;
    padding: 18px 20px;
    border-radius: 6px;
    margin: 20px 0 28px;
  }
  .results-narrative p { color: #fff; font-size: 17px; line-height: 1.5; margin: 0; }
  .dim-row {
    margin-bottom: 14px;
    opacity: 0.95;
    cursor: pointer;
    padding: 6px 8px;
    margin-left: -8px; margin-right: -8px;
    border-radius: 8px;
    transition: background 0.12s;
  }
  .dim-row:hover { background: rgba(255, 130, 0, 0.05); }
  .dim-row.low-conf { opacity: 0.4; }
  .dim-row.edited .dim-id::after {
    content: ' · edited';
    color: #FBDB65;
    font-weight: 600;
    letter-spacing: 0;
  }
  .dim-row.edited .dim-bar-fill { background: #FBDB65; }
  .dim-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px; font-size: 13px;
  }
  .dim-id { color: #FF8200; font-weight: 700; font-size: 11px; letter-spacing: 0.5px; }
  .dim-conf { color: #6b7280; font-size: 11px; }
  .dim-editor {
    margin-top: 10px; padding: 10px 12px;
    background: rgba(251, 219, 101, 0.06);
    border: 1px solid rgba(251, 219, 101, 0.3);
    border-radius: 8px;
    font-size: 12px;
  }
  .dim-editor input[type="range"] {
    width: 100%;
    accent-color: #FBDB65;
    margin: 8px 0 6px;
  }
  .dim-editor .editor-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px;
  }
  .dim-editor .editor-val {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #FBDB65; font-weight: 700; font-size: 13px;
    min-width: 48px; text-align: right;
  }
  .dim-editor button {
    background: rgba(255,255,255,0.06); color: #cbd5e1;
    padding: 6px 10px; font-size: 12px; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .dim-editor button:hover { background: rgba(255,255,255,0.12); }
  .dim-editor .editor-warn {
    color: #94a3b8; font-size: 11px; margin: 4px 0 0;
    line-height: 1.4;
  }
  .dim-bar-bg {
    height: 8px; background: #1f2937; border-radius: 4px;
    position: relative; overflow: hidden;
  }
  .dim-bar-center {
    position: absolute; left: 50%; top: 0; bottom: 0;
    width: 1px; background: #4b5563;
  }
  .dim-bar-fill {
    position: absolute; top: 0; bottom: 0;
    background: #FF8200;
    transition: width 0.4s, left 0.4s;
  }
  .dim-labels {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #6b7280; margin-top: 3px;
  }
  .cluster-section { margin-bottom: 28px; }
  .cluster-title {
    font-size: 13px; font-weight: 700; color: #FBDB65; letter-spacing: 1px;
    margin: 0 0 14px; text-transform: uppercase;
  }
  .footer-note {
    margin-top: 40px; padding-top: 24px;
    border-top: 1px solid #1f2937;
    font-size: 13px; color: #94a3b8;
  }
  .footer-note p { margin-bottom: 8px; color: #94a3b8; }
  .crunching {
    text-align: center; padding: 80px 20px;
  }
  .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid #1f2937;
    border-top-color: #FF8200;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .json-export {
    background: #0a0a0a; color: #94a3b8;
    border: 1px solid #1f2937;
    padding: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; line-height: 1.5;
    border-radius: 6px;
    max-height: 240px; overflow: auto;
    white-space: pre;
    margin-top: 12px;
  }
  .badge {
    display: inline-block; padding: 3px 8px; font-size: 11px;
    background: rgba(255, 130, 0, 0.15); color: #FF8200;
    border-radius: 999px; font-weight: 600; letter-spacing: 0.3px;
  }
  .error {
    background: rgba(239, 68, 68, 0.1); color: #fca5a5;
    border-left: 3px solid #ef4444;
    padding: 16px; border-radius: 4px;
    font-size: 14px; margin: 20px 0;
  }
  @media (max-width: 480px) {
    h1 { font-size: 24px; }
    .question-text { font-size: 19px; }
    .answer { padding: 16px 14px; font-size: 15px; }
    .likert-row { flex-direction: column; gap: 6px; }
    .likert-row .answer { padding: 12px; font-size: 14px; }
  }
</style>
</head>
<body>
<main id="app">
  <div class="crunching">
    <div class="spinner"></div>
    <p style="margin-top: 16px;">Loading…</p>
  </div>
</main>

<script>
(async function () {
  'use strict';

  const TARGET_QUESTIONS = 18;

  const app = document.getElementById('app');
  let bank, dims;
  let sampled = [];
  let currentIdx = 0;
  let responses = [];

  // -------------------- LOAD DATA --------------------
  let gameInfo = {};
  try {
    [bank, dims, gameInfo] = await Promise.all([
      fetch('/quiz/question-bank.json').then(r => r.json()),
      fetch('/quiz/dimensions.json').then(r => r.json()),
      // Game info for this-or-that questions. Best-effort — quiz works
      // without it; the info-expand buttons just won't have content.
      fetch('/quiz/game-info.json').then(r => r.ok ? r.json() : {}).catch(() => ({})),
    ]);
  } catch (err) {
    app.innerHTML = `<h1>Couldn’t load quiz data</h1>
      <p>This page needs <code>question-bank.json</code> and <code>dimensions.json</code> next to <code>index.html</code>.</p>
      <div class="error">${err.message}</div>
      <p>If you’re opening the file directly (file://), some browsers block local fetches. Try running:</p>
      <p><code>python3 -m http.server 8080</code></p>
      <p>then visit http://localhost:8080</p>`;
    return;
  }

  // -------------------- SAMPLING --------------------
  function sampleQuestions() {
    const all = [...bank.questions];
    const picked = new Set();

    function pick(arr, n) {
      const shuffled = arr.slice().sort(() => Math.random() - 0.5);
      let added = 0;
      for (const q of shuffled) {
        if (added >= n) break;
        if (!picked.has(q.id)) {
          picked.add(q.id);
          added++;
        }
      }
    }

    // Phase 1: each cluster hit at least 2 times
    const clusters = ['PSY', 'SOC', 'MEC', 'AES', 'CTX', 'EMO'];
    for (const cluster of clusters) {
      const candidates = all.filter(q =>
        q.answers.some(a =>
          Object.keys(a.weights || {}).some(k => k.startsWith(cluster + '_'))
        )
      );
      pick(candidates, 2);
    }

    // Phase 2: format minimums
    const formatMin = (bank.sampling_rules && bank.sampling_rules.format_minimums) || {
      game_vs_game: 1, this_or_that: 2, likert: 2, multiple_choice: 1
    };
    for (const [fmt, n] of Object.entries(formatMin)) {
      const have = [...picked].filter(id => all.find(q => q.id === id).type === fmt).length;
      const need = Math.max(0, n - have);
      if (need > 0) {
        const candidates = all.filter(q => q.type === fmt);
        pick(candidates, need);
      }
    }

    // Phase 3: fill to target
    pick(all, TARGET_QUESTIONS - picked.size);

    // Return shuffled (for variety in presentation order)
    return [...picked].map(id => all.find(q => q.id === id))
      .sort(() => Math.random() - 0.5);
  }

  // -------------------- SCORING --------------------
  function computeProfile() {
    const V = {}, C = {}, N = {};
    for (const d of dims.dimensions) {
      V[d.id] = 0; C[d.id] = 0; N[d.id] = 0;
    }
    for (const resp of responses) {
      const weights = resp.answer.weights || {};
      for (const [dim, w] of Object.entries(weights)) {
        if (V[dim] === undefined) continue;
        V[dim] += w;
        C[dim] += Math.abs(w);
        N[dim] += 1;
      }
    }
    const profile = {}, confidence = {};
    for (const d of dims.dimensions) {
      profile[d.id] = V[d.id] / Math.max(1, C[d.id]);
      confidence[d.id] = Math.min(1, N[d.id] / 3);
    }
    return { profile, confidence, raw_v: V, count: N };
  }

  function generateNarrative(profile, confidence) {
    const scored = dims.dimensions.map(d => ({
      d,
      score: profile[d.id],
      conf: confidence[d.id],
      salience: Math.abs(profile[d.id]) * confidence[d.id],
    })).filter(x => x.salience > 0.15);

    scored.sort((a, b) => b.salience - a.salience);
    const top = scored.slice(0, 5);

    if (top.length === 0) {
      return 'Your profile came back fairly neutral — you didn’t lean strongly in any one direction. That’s a real result, not a failure: it suggests you’re flexible across game types.';
    }

    const phrases = top.map(({ d, score }) => (score > 0 ? d.high : d.low).toLowerCase());
    const top3 = phrases.slice(0, 3);
    const next2 = phrases.slice(3, 5);

    let narrative = `You lean ${top3.join(', ')}`;
    if (next2.length > 0) {
      narrative += `, with notes of ${next2.join(' and ')}`;
    }
    narrative += '.';
    return narrative;
  }

  // -------------------- RENDERING --------------------
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function renderIntro() {
    app.innerHTML = `
      <span class="badge">Research preview</span>
      <h1 style="margin-top: 14px;">What kind of tabletop player are you?</h1>
      <p>About 18 quick questions — “this-or-that”, agree/disagree, and a few “which game tonight?” picks.</p>
      <p>You’ll get back a 24-dimension profile of your gaming preferences. Takes ~5 minutes.</p>
      <p style="margin-bottom: 28px;"><small>Nothing leaves your device. The result is yours; you can copy or download it. This is a research instrument; recommendations come in a future version.</small></p>
      <button class="btn-primary" onclick="window.__begin()">Begin</button>
    `;
  }

  window.__begin = () => {
    sampled = sampleQuestions();
    currentIdx = 0;
    responses = [];
    renderQuestion();
  };

  function renderQuestion() {
    const q = sampled[currentIdx];
    const pct = Math.round(((currentIdx) / sampled.length) * 100);

    let answersHtml = '';
    if (q.type === 'likert') {
      const items = q.answers.map((a, i) => `
        <button class="answer" onclick="window.__answer(${i})">${escapeHtml(a.text)}</button>
      `).join('');
      answersHtml = items;
    } else if (q.type === 'game_vs_game') {
      answersHtml = q.answers.map((a, i) => {
        const lines = a.text.split(' — ');
        const name = lines[0];
        const meta = lines.slice(1).join(' — ');
        const bggId = a.bgg_id || a.game_id || null;
        const infoBtn = bggId
          ? `<span onclick="event.stopPropagation(); window.__toggleGameInfo(${bggId}); return false;" style="display:inline-block; margin-left:8px; padding:2px 7px; border:1px solid rgba(255,255,255,0.2); border-radius:10px; font-size:11px; font-weight:600; opacity:0.65; cursor:pointer;" title="More info about this game">i</span>`
          : '';
        return `<button class="answer answer-game" onclick="window.__answer(${i})">
          <span class="game-name">${escapeHtml(name)}${infoBtn}</span>
          <span class="game-meta">${escapeHtml(meta)}</span>
          <div id="game-info-${bggId}" style="display:none; margin-top:8px; padding:8px 10px; background:rgba(0,0,0,0.25); border-radius:6px; font-size:13px; line-height:1.5; color:#cbd5e1; text-align:left;"></div>
        </button>`;
      }).join('');
    } else {
      // this_or_that or multiple_choice
      answersHtml = q.answers.map((a, i) => `
        <button class="answer" onclick="window.__answer(${i})">${escapeHtml(a.text)}</button>
      `).join('');
    }

    app.innerHTML = `
      <div class="progress-track"><div class="progress-fill" style="width: ${pct}%"></div></div>
      <div class="question-meta">
        <span>Question ${currentIdx + 1} of ${sampled.length}</span>
        <span>${escapeHtml(q.type.replace(/_/g, ' '))}</span>
      </div>
      <p class="question-text">${escapeHtml(q.text)}</p>
      ${answersHtml}
    `;
    window.scrollTo(0, 0);
  }

  window.__answer = (answerIdx) => {
    const q = sampled[currentIdx];
    const answer = q.answers[answerIdx];
    responses.push({
      questionId: q.id,
      questionType: q.type,
      answerIndex: answerIdx,
      answer: answer,
    });
    currentIdx++;
    if (currentIdx >= sampled.length) {
      renderCrunching();
    } else {
      renderQuestion();
    }
  };

  function renderCrunching() {
    app.innerHTML = `
      <div class="crunching">
        <div class="spinner"></div>
        <p style="margin-top: 16px;">Computing your profile…</p>
      </div>
    `;
    setTimeout(renderResults, 700);
  }

  function renderResults() {
    const { profile, confidence, count } = computeProfile();
    const narrative = generateNarrative(profile, confidence);

    // Group dimensions by cluster
    const byCluster = {};
    for (const d of dims.dimensions) {
      if (!byCluster[d.cluster]) byCluster[d.cluster] = [];
      byCluster[d.cluster].push(d);
    }

    const clusterOrder = ['PSY', 'SOC', 'MEC', 'AES', 'CTX', 'EMO'];
    const clusterNames = (dims.clusters || {});

    let clustersHtml = '';
    for (const ck of clusterOrder) {
      if (!byCluster[ck]) continue;
      const rows = byCluster[ck].map(d => {
        const v = profile[d.id];
        const conf = confidence[d.id];
        const lowConf = conf < 0.34;
        // bar: -1.0 to +1.0 mapped to 0..100% with 50% center
        const pct = (v + 1) * 50; // 0..100
        const fillLeft = Math.min(50, pct);
        const fillWidth = Math.abs(pct - 50);
        return `<div class="dim-row${lowConf ? ' low-conf' : ''}" id="dimrow-${escapeHtml(d.id)}" onclick="window.__toggleDimEditor('${escapeHtml(d.id)}')" data-dim-id="${escapeHtml(d.id)}" data-low="${escapeHtml(d.low)}" data-high="${escapeHtml(d.high)}">
          <div class="dim-header">
            <span class="dim-id">${escapeHtml(d.id)}</span>
            <span class="dim-conf">conf ${(conf * 100).toFixed(0)}% · ${count[d.id]}q</span>
          </div>
          <div class="dim-bar-bg">
            <div class="dim-bar-center"></div>
            <div class="dim-bar-fill" style="left: ${fillLeft}%; width: ${fillWidth}%;"></div>
          </div>
          <div class="dim-labels">
            <span>${escapeHtml(d.low)}</span>
            <span>${escapeHtml(d.high)}</span>
          </div>
          <div class="dim-editor-slot" id="dimedit-${escapeHtml(d.id)}" style="display:none;"></div>
        </div>`;
      }).join('');
      clustersHtml += `<section class="cluster-section">
        <h3 class="cluster-title">${escapeHtml(clusterNames[ck] || ck)}</h3>
        ${rows}
      </section>`;
    }

    const exportData = {
      meta: {
        bank_version: bank.metadata?.version,
        questions_answered: responses.length,
        timestamp: new Date().toISOString(),
      },
      profile,
      confidence,
      raw: responses.map(r => ({
        question_id: r.questionId,
        question_type: r.questionType,
        answer_index: r.answerIndex,
        answer_text: r.answer.text,
      })),
    };
    const exportJson = JSON.stringify(exportData, null, 2);

    app.innerHTML = `
      <div class="progress-track"><div class="progress-fill" style="width: 100%"></div></div>
      <h1>Your tabletop profile</h1>
      <div class="results-narrative"><p>${escapeHtml(narrative)}</p></div>
      <p style="margin-bottom: 24px;"><small>The bars show where you sit on each dimension. Bars at low opacity got fewer questions — take the quiz again for sharper signal there.</small></p>
      ${clustersHtml}
      <div style="margin: 32px 0; padding: 24px; background: rgba(255, 130, 0, 0.08); border: 1px solid rgba(255, 130, 0, 0.4); border-radius: 12px; text-align: center;">
        <h2 style="margin: 0 0 12px; color: #FBDB65;">See games that match this profile</h2>
        <p style="margin: 0 0 16px; opacity: 0.85;">Cosine-matched against a hand-authored 225-game corpus. Diversified pick of 12.</p>
        <button id="recs-btn" class="btn-primary" onclick="window.__getRecs()">Show me recommendations</button>
      </div>
      <div id="recs-container" style="margin-top: 16px;"></div>
      <div class="footer-note">
        <p><strong>Profile JSON</strong> — your data, no server side. Copy or save.</p>
        <pre class="json-export" id="json-out">${escapeHtml(exportJson)}</pre>
        <p style="margin-top: 14px;"><button class="btn-secondary" onclick="window.__copy()">Copy JSON</button>
          <button class="btn-secondary" onclick="window.__download()" style="margin-left: 8px;">Download</button>
          <button class="btn-secondary" onclick="window.__retake()" style="margin-left: 8px;">Retake</button></p>
        <p style="margin-top: 24px;"><small>This is a research instrument from the Mimir engineering team. Feedback on which questions felt off, missing, or which recommendations surprised you (good or bad) is gold.</small></p>
      </div>
    `;
    window.__exportJson = exportJson;
    window.__profile = profile;
    // Snapshot the quiz-derived profile so the per-dim editor's
    // "Reset to quiz answer" can restore it. window.__profile is
    // mutated in place by the editor; baseline must be a copy.
    window.__profileBaseline = { ...profile };
    window.__edited = new Set();
  }

  // ----- Anon session id + per-game feedback signals -----
  // Browser-generated uuid stored in localStorage so anon quiz takers
  // can leave thumbs-up/down on recs and have those persist across
  // page reloads. When the user later signs in + claims a Passport,
  // we can migrate signals over by anon_session_id.
  window.__getAnonSessionId = () => {
    try {
      let id = localStorage.getItem('seidr_anon_id');
      if (!id) {
        // crypto.randomUUID is widely supported; fall back to a simple
        // hex-string for very old browsers.
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
          id = window.crypto.randomUUID();
        } else {
          id = 'anon-' + Date.now().toString(16) + '-' + Math.random().toString(16).slice(2, 10);
        }
        localStorage.setItem('seidr_anon_id', id);
      }
      return id;
    } catch (e) {
      // Private browsing or storage disabled — generate ephemeral id
      // that lives only for this page lifetime.
      if (!window.__ephemeralAnonId) {
        window.__ephemeralAnonId = 'anon-eph-' + Math.random().toString(16).slice(2, 10);
      }
      return window.__ephemeralAnonId;
    }
  };

  // Active signal state (game_id → Set of kinds). Persisted to localStorage
  // so reloads + back-navigation don't lose the user's reactions.
  window.__loadLocalSignals = () => {
    try {
      const raw = localStorage.getItem('seidr_signals');
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      const out = {};
      for (const [k, arr] of Object.entries(parsed || {})) {
        if (Array.isArray(arr)) out[k] = new Set(arr);
      }
      return out;
    } catch { return {}; }
  };
  window.__saveLocalSignals = () => {
    try {
      const out = {};
      for (const [k, set] of Object.entries(window.__signals || {})) {
        out[k] = Array.from(set);
      }
      localStorage.setItem('seidr_signals', JSON.stringify(out));
    } catch {}
  };
  window.__signals = window.__loadLocalSignals();

  // Three primary action buttons per rec. Any kind from the API is
  // valid, but UI surface is intentionally narrow — extra kinds (loved,
  // tried_disliked) are reserved for a future "I've played this"
  // affordance where the user can rate a game they specifically know.
  window.__buildFeedbackBar = (gameId) => {
    const set = window.__signals[String(gameId)] || new Set();
    const btn = (kind, label, activeColor) => {
      const on = set.has(kind);
      const bg = on ? activeColor : 'rgba(255,255,255,0.04)';
      const color = on ? '#0a0a0a' : 'rgba(255,255,255,0.7)';
      const border = on ? activeColor : 'rgba(255,255,255,0.12)';
      return `<button onclick="event.stopPropagation(); window.__toggleSignal(${gameId}, '${kind}')"
        style="padding:4px 10px; font-size:0.72rem; font-weight:600;
        background:${bg}; color:${color}; border:1px solid ${border};
        border-radius:14px; margin-right:5px; cursor:pointer;">${label}</button>`;
    };
    return `<div id="rec-fb-${gameId}" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:0;">
      ${btn('thumbs_up', '👍 Good rec', '#10b981')}
      ${btn('thumbs_down', '👎 Off', '#ef4444')}
      ${btn('owned', '📦 I own this', '#FBDB65')}
      ${btn('never_heard_of', '👀 New to me', '#7D55C7')}
    </div>`;
  };

  // Toggle a signal: if not set, POST + add to local state; if set,
  // DELETE + remove. Optimistic UI — reverts on error.
  window.__toggleSignal = async (gameId, kind) => {
    const key = String(gameId);
    if (!window.__signals[key]) window.__signals[key] = new Set();
    const set = window.__signals[key];
    const wasOn = set.has(kind);

    // Optimistic flip + repaint.
    if (wasOn) set.delete(kind); else set.add(kind);
    window.__saveLocalSignals();
    const bar = document.getElementById('rec-fb-' + gameId);
    if (bar) bar.outerHTML = window.__buildFeedbackBar(gameId);

    try {
      const res = await fetch('/api/recs/feedback', {
        method: wasOn ? 'DELETE' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          anon_session_id: window.__getAnonSessionId(),
          game_id: gameId,
          kind,
          ...(window.__lastRecEventId ? { recommendation_event_id: Number(window.__lastRecEventId) } : {}),
        }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } catch (err) {
      // Revert on failure.
      if (wasOn) set.add(kind); else set.delete(kind);
      window.__saveLocalSignals();
      const bar2 = document.getElementById('rec-fb-' + gameId);
      if (bar2) bar2.outerHTML = window.__buildFeedbackBar(gameId);
      console.warn('feedback save failed:', err);
    }
  };

  // Tracks dim ids the user has manually edited via the slider editor.
  // Used to render the "edited" badge + tint and to make the warning
  // about resetting only show when there's something to reset.
  window.__edited = window.__edited || new Set();

  // Re-renders the bar fill + edited class on a single dim row in place,
  // so the user sees their slider change reflected immediately without
  // a full re-render that would close the editor.
  window.__paintDimRow = (dimId) => {
    const row = document.getElementById('dimrow-' + dimId);
    if (!row) return;
    const v = window.__profile[dimId];
    if (typeof v !== 'number') return;
    const pct = (v + 1) * 50;
    const fillLeft = Math.min(50, pct);
    const fillWidth = Math.abs(pct - 50);
    const fill = row.querySelector('.dim-bar-fill');
    if (fill) {
      fill.style.left = fillLeft + '%';
      fill.style.width = fillWidth + '%';
    }
    if (window.__edited.has(dimId)) row.classList.add('edited');
    else row.classList.remove('edited');
  };

  window.__toggleDimEditor = (dimId) => {
    const slot = document.getElementById('dimedit-' + dimId);
    const row = document.getElementById('dimrow-' + dimId);
    if (!slot || !row) return;
    if (slot.style.display !== 'none') {
      slot.style.display = 'none';
      slot.innerHTML = '';
      return;
    }
    const low = row.dataset.low || 'low';
    const high = row.dataset.high || 'high';
    const v = typeof window.__profile[dimId] === 'number' ? window.__profile[dimId] : 0;
    const slider = (Math.round(v * 100)).toString();
    slot.innerHTML = `
      <div class="dim-editor" onclick="event.stopPropagation()">
        <p class="editor-warn"><strong style="color:#FBDB65;">Heads up:</strong> these scores reflect what your answers said about you. Editing tells the system "you got me wrong here." Only nudge a dim if the recs from this dim feel clearly off.</p>
        <input type="range" min="-100" max="100" step="5" value="${slider}"
          oninput="window.__setDimValue('${dimId}', this.value, this.parentElement.querySelector('.editor-val'))">
        <div class="editor-row">
          <span style="opacity:0.7;">${escapeHtml(low)}</span>
          <span class="editor-val">${(v).toFixed(2)}</span>
          <span style="opacity:0.7;">${escapeHtml(high)}</span>
        </div>
        <div class="editor-row" style="margin-top:8px;">
          <button onclick="window.__resetDim('${dimId}')">Reset to quiz answer</button>
          <button onclick="window.__toggleDimEditor('${dimId}')">Done</button>
        </div>
      </div>
    `;
    slot.style.display = 'block';
  };

  window.__setDimValue = (dimId, rawSlider, valEl) => {
    const v = Math.max(-1, Math.min(1, Number(rawSlider) / 100));
    window.__profile[dimId] = v;
    window.__edited.add(dimId);
    if (valEl) valEl.textContent = v.toFixed(2);
    window.__paintDimRow(dimId);
    // Cue: if recs are visible, hint they're stale.
    const recsContainer = document.getElementById('recs-container');
    if (recsContainer && recsContainer.children.length > 0) {
      const btn = document.getElementById('recs-btn');
      if (btn) btn.textContent = 'Recompute with edits';
    }
  };

  // Resets a single dim back to the value the quiz computed.
  window.__resetDim = (dimId) => {
    if (!window.__profileBaseline) return;
    const base = window.__profileBaseline[dimId];
    if (typeof base !== 'number') return;
    window.__profile[dimId] = base;
    window.__edited.delete(dimId);
    window.__paintDimRow(dimId);
    const slot = document.getElementById('dimedit-' + dimId);
    if (slot && slot.style.display !== 'none') {
      const slider = slot.querySelector('input[type="range"]');
      const valEl = slot.querySelector('.editor-val');
      if (slider) slider.value = (Math.round(base * 100)).toString();
      if (valEl) valEl.textContent = base.toFixed(2);
    }
  };

  window.__getRecs = async () => {
    const btn = document.getElementById('recs-btn');
    const container = document.getElementById('recs-container');
    if (btn) { btn.disabled = true; btn.textContent = 'Thinking…'; }
    container.innerHTML = '';

    try {
      // Mood deltas + filters are computed on each call. They don't
      // persist — a page reload clears them.
      const moodDelta = (typeof window.__computeMoodDelta === 'function')
        ? window.__computeMoodDelta()
        : {};
      const hasMoodDelta = Object.keys(moodDelta).length > 0;
      const filters = (typeof window.__computeFilters === 'function')
        ? window.__computeFilters()
        : {};
      const hasFilters = Object.keys(filters).length > 0;

      const anonId = window.__getAnonSessionId();
      const res = await fetch('/api/quiz/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          profile: window.__profile,
          limit: 12,
          anon_session_id: anonId,
          ...(hasMoodDelta ? { mood_delta: moodDelta } : {}),
          ...(hasFilters ? { filters } : {}),
        }),
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${res.status}`);
      }
      const data = await res.json();

      if (!data.recommendations || data.recommendations.length === 0) {
        container.innerHTML = `<p style="text-align:center; opacity:0.7;">No recommendations came back. Engines that ran: ${(data.engines_ran || []).join(', ') || 'none'}.</p>`;
        if (btn) { btn.disabled = false; btn.textContent = 'Try again'; }
        return;
      }

      // Build a dim-id → {low, high} label lookup from dimensions.json
      // (already loaded for the quiz). Lets us turn "PSY_ACHIEVEMENT,
      // agree_high" into "Mastery/Optimization" for the chips below.
      const dimMeta = {};
      for (const d of (dims.dimensions || [])) {
        dimMeta[d.id] = { low: d.low, high: d.high };
      }

      function chipForContribution(c) {
        const meta = dimMeta[c.dim] || { low: c.dim, high: c.dim };
        let label, bg, color, prefix;
        if (c.kind === 'agree_high') {
          label = meta.high;
          bg = 'rgba(16, 185, 129, 0.14)';
          color = '#10b981';
          prefix = 'both like';
        } else if (c.kind === 'agree_low') {
          label = meta.low;
          bg = 'rgba(16, 185, 129, 0.14)';
          color = '#10b981';
          prefix = 'both prefer';
        } else if (c.kind === 'disagree') {
          // Player and game are on opposite sides — shows up rarely in
          // top-3 of a high-scoring rec, but worth flagging when it does.
          label = c.player > 0 ? meta.high : meta.low;
          bg = 'rgba(239, 68, 68, 0.14)';
          color = '#ef4444';
          prefix = 'gap';
        } else {
          label = c.dim;
          bg = 'rgba(255,255,255,0.06)';
          color = 'rgba(255,255,255,0.6)';
          prefix = '';
        }
        return `<span style="display:inline-flex; gap:6px; align-items:baseline; padding:3px 8px; background:${bg}; color:${color}; border-radius:999px; font-size:0.74rem; font-weight:600; margin-right:6px; margin-top:4px;">
          <span style="opacity:0.7; text-transform:uppercase; letter-spacing:0.04em; font-size:0.62rem;">${prefix}</span>
          ${escapeHtml(label)}
        </span>`;
      }

      // Mood cards: paired axes that nudge specific dims. Each card
      // pair shares an axis; tapping one side adds delta, tapping the
      // other side subtracts. Tapping the same side again clears the
      // mood. Re-fetches recs each time. Stable IDs let us track which
      // are active across re-renders.
      const moodAxes = [
        {
          id: 'cooperation',
          dim: 'SOC_COOP_COMP',
          step: 0.6,
          left:  { id: 'spicy',    label: 'Spicy & competitive', emoji: '🌶️', signSign: -1 },
          right: { id: 'cozy',     label: 'Cozy & cooperative',  emoji: '🤝', signSign: +1 },
        },
        {
          id: 'narrative',
          dim: 'AES_NARRATIVE',
          step: 0.5,
          left:  { id: 'numbers',  label: 'Numbers-driven',      emoji: '🧮', signSign: -1 },
          right: { id: 'story',    label: 'Story-driven',        emoji: '🎭', signSign: +1 },
        },
        {
          id: 'length',
          dim: 'CTX_TIME',
          step: 0.6,
          left:  { id: 'quick',    label: 'Quick punch',          emoji: '⚡', signSign: -1 },
          right: { id: 'epic',     label: 'Epic journey',         emoji: '🌌', signSign: +1 },
        },
        {
          id: 'complexity',
          dim: 'MEC_COMPLEXITY',
          step: 0.5,
          left:  { id: 'breezy',   label: 'Breezy & light',       emoji: '🪶', signSign: -1 },
          right: { id: 'crunchy',  label: 'Crunchy & deep',       emoji: '🧠', signSign: +1 },
        },
        {
          id: 'humor',
          dim: 'EMO_HUMOR',
          step: 0.5,
          left:  { id: 'serious',  label: 'Serious vibe',         emoji: '🎯', signSign: -1 },
          right: { id: 'silly',    label: 'Silly vibe',           emoji: '😂', signSign: +1 },
        },
      ];

      function buildMoodCardsHtml() {
        const active = window.__moodActive || {}; // axisId → 'left' | 'right'
        return moodAxes.map(axis => {
          const isLeft = active[axis.id] === 'left';
          const isRight = active[axis.id] === 'right';
          const cardStyle = (on) => `flex:1; padding:8px 10px; background:${on ? 'rgba(255,130,0,0.18)' : 'rgba(255,255,255,0.04)'}; border:1px solid ${on ? '#FF8200' : 'rgba(255,255,255,0.08)'}; border-radius:8px; cursor:pointer; text-align:center; transition: all 120ms; font-size: 0.82rem; color: ${on ? '#FBDB65' : '#e2e8f0'};`;
          return `<div style="display:flex; gap:6px; margin-bottom:6px;">
            <div onclick="window.__moodTap('${axis.id}', 'left')" style="${cardStyle(isLeft)}">
              <span style="font-size:1.05rem;">${axis.left.emoji}</span> ${axis.left.label}
            </div>
            <div onclick="window.__moodTap('${axis.id}', 'right')" style="${cardStyle(isRight)}">
              <span style="font-size:1.05rem;">${axis.right.emoji}</span> ${axis.right.label}
            </div>
          </div>`;
        }).join('');
      }

      // Compute the delta from active mood selections.
      window.__computeMoodDelta = () => {
        const active = window.__moodActive || {};
        const delta = {};
        for (const axis of moodAxes) {
          const side = active[axis.id];
          if (!side) continue;
          const sign = axis[side].signSign;
          delta[axis.dim] = (delta[axis.dim] || 0) + sign * axis.step;
        }
        return delta;
      };

      // Tap a card. Same-side tap clears; opposite-side tap flips.
      window.__moodTap = (axisId, side) => {
        if (!window.__moodActive) window.__moodActive = {};
        if (window.__moodActive[axisId] === side) {
          delete window.__moodActive[axisId];
        } else {
          window.__moodActive[axisId] = side;
        }
        window.__getRecs(); // re-fetch with new mood
      };

      // Stash the rec event id so feedback button clicks can attach to it.
      window.__lastRecEventId = data.recommendation_event_id || null;

      const items = data.recommendations.map((r, i) => {
        const name = r.game_name || `Game #${r.game_id}`;
        const score = (r.score * 100).toFixed(0);
        const bggUrl = `https://boardgamegeek.com/boardgame/${r.game_id}`;
        const contribs = (r.top_dim_contributions || []).map(chipForContribution).join('');

        // Metadata line: year · subdomain · top categories
        const metaParts = [];
        if (r.year) metaParts.push(String(r.year));
        if (r.subdomain) metaParts.push(escapeHtml(r.subdomain));
        const cats = (r.categories || []).slice(0, 2);
        if (cats.length > 0) metaParts.push(cats.map(escapeHtml).join(' · '));
        const metaLine = metaParts.length
          ? `<div style="font-size:0.74rem; opacity:0.55; margin-top:1px;">${metaParts.join(' &middot; ')}</div>`
          : '';

        const fb = window.__buildFeedbackBar(r.game_id);

        return `<div id="rec-card-${r.game_id}" style="display:flex; align-items:flex-start; gap:14px; padding:12px 14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; margin-bottom:8px;">
          <div style="flex-shrink:0; width:32px; height:32px; border-radius:50%; background:rgba(255,130,0,0.2); color:#FF8200; display:flex; align-items:center; justify-content:center; font-weight:700; margin-top:2px;">${i + 1}</div>
          <div style="flex:1; min-width:0;">
            <div style="font-weight:600; color:#f8fafc;">${escapeHtml(name)}</div>
            ${metaLine}
            <div style="font-size:0.78rem; opacity:0.6; margin-top:4px;">match ${score}% &middot; <a href="${bggUrl}" target="_blank" rel="noopener" style="color:rgba(255,255,255,0.6); text-decoration:underline;">BGG #${r.game_id}</a></div>
            ${contribs ? `<div style="margin-top:6px; line-height:1.6;">${contribs}</div>` : ''}
            ${fb}
          </div>
        </div>`;
      }).join('');

      const activeMoodCount = Object.keys(window.__moodActive || {}).length;
      const moodSummary = activeMoodCount === 0
        ? '<small style="opacity: 0.6;">Tap to nudge your recommendations toward a mood without re-taking the quiz.</small>'
        : `<small style="opacity: 0.7;">${activeMoodCount} mood nudge${activeMoodCount === 1 ? '' : 's'} active. Tap again to clear.</small>`;

      // Filter UI: era + genre. Both apply hard filters before the
      // matcher sees candidates. Stored in window.__filters across
      // re-renders so toggles persist while the user iterates.
      const ALL_SUBDOMAINS = ['Strategy', 'Family', 'Party', 'Wargame', 'Thematic', 'Customizable', 'Children', 'Abstract'];
      const ERAS = [
        { id: 'any',     label: 'Any era',  emoji: '📅' },
        { id: 'modern',  label: 'Modern (2015+)', emoji: '✨', minYear: 2015 },
        { id: 'recent',  label: '2010s',          emoji: '🆕', minYear: 2010, maxYear: 2019 },
        { id: 'classic', label: 'Classic (pre-2010)', emoji: '📜', maxYear: 2009 },
      ];
      function buildFilterRowHtml() {
        const f = window.__filters || { eraId: 'any', subdomains: [] };
        const eraChips = ERAS.map(e => {
          const on = f.eraId === e.id;
          return `<button onclick="window.__setEra('${e.id}')" style="padding:5px 10px; border-radius:14px; border:1px solid ${on ? '#FF8200' : 'rgba(255,255,255,0.12)'}; background:${on ? 'rgba(255,130,0,0.18)' : 'rgba(255,255,255,0.04)'}; color:${on ? '#FBDB65' : '#e2e8f0'}; font-size:0.78rem; cursor:pointer; margin-right:4px;">${e.emoji} ${e.label}</button>`;
        }).join('');
        const subChips = ALL_SUBDOMAINS.map(s => {
          const on = f.subdomains.includes(s);
          return `<button onclick="window.__toggleSub('${s}')" style="padding:5px 10px; border-radius:14px; border:1px solid ${on ? '#FF8200' : 'rgba(255,255,255,0.12)'}; background:${on ? 'rgba(255,130,0,0.18)' : 'rgba(255,255,255,0.04)'}; color:${on ? '#FBDB65' : '#e2e8f0'}; font-size:0.78rem; cursor:pointer; margin-right:4px; margin-bottom:4px;">${s}</button>`;
        }).join('');
        const hasFilters = f.eraId !== 'any' || f.subdomains.length > 0;
        const summary = hasFilters
          ? `<small style="opacity:0.7;">Filters: ${f.eraId !== 'any' ? f.eraId : ''}${f.subdomains.length ? ' · ' + f.subdomains.join(', ') : ''}. <a href="#" onclick="window.__clearFilters(); return false;" style="color:#FF8200;">Clear all</a></small>`
          : '<small style="opacity:0.55;">Filter your candidate pool by era or genre. All games are considered by default.</small>';
        return `
          ${summary}
          <div style="margin-top:10px;"><div style="opacity:0.65; font-size:0.74rem; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px;">Era</div>${eraChips}</div>
          <div style="margin-top:10px;"><div style="opacity:0.65; font-size:0.74rem; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px;">Genre (multi-select)</div>${subChips}</div>
        `;
      }

      window.__setEra = (eraId) => {
        if (!window.__filters) window.__filters = { eraId: 'any', subdomains: [] };
        window.__filters.eraId = window.__filters.eraId === eraId && eraId !== 'any' ? 'any' : eraId;
        window.__getRecs();
      };
      window.__toggleSub = (sub) => {
        if (!window.__filters) window.__filters = { eraId: 'any', subdomains: [] };
        const i = window.__filters.subdomains.indexOf(sub);
        if (i >= 0) window.__filters.subdomains.splice(i, 1);
        else window.__filters.subdomains.push(sub);
        window.__getRecs();
      };
      window.__clearFilters = () => {
        window.__filters = { eraId: 'any', subdomains: [] };
        window.__getRecs();
      };
      window.__computeFilters = () => {
        const f = window.__filters || { eraId: 'any', subdomains: [] };
        const era = ERAS.find(e => e.id === f.eraId);
        const out = {};
        if (era && era.minYear) out.min_year = era.minYear;
        if (era && era.maxYear) out.max_year = era.maxYear;
        if (f.subdomains.length > 0) out.subdomains = f.subdomains;
        return out;
      };

      container.innerHTML = `
        <h2 style="color: #FBDB65; margin: 24px 0 8px;">Filter the pool</h2>
        <div style="margin: 8px 0 24px;">${buildFilterRowHtml()}</div>
        <h2 style="color: #FBDB65; margin: 24px 0 8px;">Tonight's mood</h2>
        ${moodSummary}
        <div style="margin: 12px 0 24px;">${buildMoodCardsHtml()}</div>
        <h2 style="color: #FBDB65; margin: 24px 0 12px;">Top 12 recommendations</h2>
        <div>${items}</div>
        <p style="margin-top: 16px; opacity: 0.6; font-size: 0.85rem;">Considered ${data.candidates_considered} candidates. Engines that ran: ${(data.engines_ran || []).join(', ')}.</p>
      `;
      if (btn) { btn.disabled = false; btn.textContent = 'Refresh recommendations'; }
    } catch (err) {
      container.innerHTML = `<p style="color:#ef4444;">${escapeHtml(String(err.message || err))}</p>`;
      if (btn) { btn.disabled = false; btn.textContent = 'Try again'; }
    }
  };

  window.__copy = async () => {
    try {
      await navigator.clipboard.writeText(window.__exportJson);
      alert('Copied!');
    } catch (e) {
      alert('Copy failed. You can select the JSON manually.');
    }
  };
  window.__download = () => {
    const blob = new Blob([window.__exportJson], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tabletop-profile-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  window.__retake = () => { renderIntro(); };

  // Toggle inline game info on this-or-that answers. Click the (i)
  // button to read about a game you don't recognize without leaving
  // the quiz flow.
  window.__toggleGameInfo = (bggId) => {
    const el = document.getElementById('game-info-' + bggId);
    if (!el) return;
    if (el.style.display === 'none') {
      const info = gameInfo[String(bggId)];
      if (info && !info.missing) {
        const players = info.minPlayers && info.maxPlayers
          ? (info.minPlayers === info.maxPlayers ? `${info.minPlayers}p` : `${info.minPlayers}-${info.maxPlayers}p`)
          : null;
        const meta = [info.year, info.subdomain, players, info.playingTime ? `${info.playingTime}min` : null]
          .filter(Boolean).join(' · ');
        const cats = (info.categories || []).slice(0, 3).join(', ');
        const desc = info.description || 'No description available.';
        const bgg = `<a href="https://boardgamegeek.com/boardgame/${bggId}" target="_blank" rel="noopener" style="color:#FF8200;">view on BGG ↗</a>`;
        el.innerHTML = `
          <div style="font-weight:700; color:#f8fafc; margin-bottom:4px;">${meta}</div>
          ${cats ? `<div style="opacity:0.7; font-size:12px; margin-bottom:6px;">${cats}</div>` : ''}
          <div>${desc}${desc.length >= 500 ? '…' : ''}</div>
          <div style="margin-top:6px; font-size:12px;">${bgg}</div>
        `;
      } else {
        el.innerHTML = `<div style="opacity:0.7;">No info available for this game.</div>`;
      }
      el.style.display = 'block';
    } else {
      el.style.display = 'none';
    }
  };

  renderIntro();
})();
</script>
</body>
</html>
